<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#0f172a"/>
  <title>Polkuopas – v15</title>
  <style>
    :root{
      --bg:#0f172a;--panel:#111827;--panel2:#1f2937;
      --text:#f8fafc;--muted:#94a3b8;--border:#334155;
      --ok:#14532d;--warn:#78350f;--left:#1e3a8a;--right:#581c87;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{min-height:100%;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    body{padding:env(safe-area-inset-top) 14px env(safe-area-inset-bottom) 14px;}
    main{max-width:520px;margin:0 auto;padding:12px 0 40px;display:flex;flex-direction:column;gap:10px;}
    h1{font-size:clamp(1.3rem,5vw,1.8rem);line-height:1.1;margin-bottom:2px;}
    p.tagline{color:var(--muted);font-size:.9rem;line-height:1.4;}

    /* Mode buttons */
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .mode-btn{appearance:none;border:2px solid var(--border);background:var(--panel2);
      color:var(--muted);border-radius:14px;padding:12px 8px;font-size:.95rem;font-weight:600;
      cursor:pointer;min-height:56px;transition:border-color .15s,background .15s,color .15s;}
    .mode-btn[aria-pressed="true"]{border-color:#facc15;background:#1c1a07;color:#facc15;}
    .mode-btn:focus-visible{outline:4px solid #facc15;outline-offset:3px;}

    /* Direction box */
    .direction{border:1px solid var(--border);border-radius:16px;padding:14px 16px 12px;
      background:var(--panel2);transition:background .25s;}
    .direction .dlabel{font-size:.85rem;opacity:.8;margin-bottom:3px;}
    .direction .dvalue{font-size:clamp(2rem,10vw,3rem);font-weight:800;line-height:1;}
    .direction .dmsg{font-size:.9rem;color:var(--muted);margin-top:6px;min-height:1.3em;}
    .state-center{background:var(--ok);}
    .state-left{background:var(--left);}
    .state-right{background:var(--right);}
    .state-uncertain{background:var(--warn);}
    .state-obstacle{background:#7c2d12;}
    .state-stopped{background:var(--panel2);}

    /* Controls */
    .ctrl-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .bottom-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
    button{appearance:none;border:1px solid #64748b;background:#e2e8f0;color:#0f172a;
      border-radius:14px;padding:13px 12px;font-size:1rem;font-weight:700;cursor:pointer;min-height:52px;}
    button.secondary{background:#334155;color:var(--text);}
    button.danger{background:#fecaca;color:#450a0a;}
    button.full{width:100%;}
    button:focus-visible{outline:4px solid #facc15;outline-offset:3px;}

    /* Collapsible sections */
    .collapsible-btn{width:100%;text-align:left;display:flex;align-items:center;
      justify-content:space-between;gap:8px;background:var(--panel2);
      border:1px solid var(--border);border-radius:14px;color:var(--text);padding:13px 16px;
      font-size:1rem;font-weight:600;cursor:pointer;}
    .collapsible-btn:focus-visible{outline:4px solid #facc15;outline-offset:3px;}
    .collapsible-btn .arrow{transition:transform .2s;font-style:normal;font-size:.85rem;}
    .collapsible-btn[aria-expanded="true"] .arrow{transform:rotate(180deg);}
    .collapsible-content{display:none;padding:12px 4px 4px;flex-direction:column;gap:10px;}
    .collapsible-content.open{display:flex;}

    /* Metrics */
    .metric{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:.9rem;margin-top:8px;}
    .bar{height:8px;border-radius:999px;background:#020617;overflow:hidden;margin-top:5px;border:1px solid #1e293b;}
    .bar>span{display:block;height:100%;width:0;background:#e2e8f0;}

    /* Settings inputs */
    label.setting{display:block;color:var(--muted);line-height:1.4;font-size:.9rem;}
    input[type="range"]{width:100%;margin-top:6px;}
    select{width:100%;margin-top:6px;border-radius:12px;border:1px solid #64748b;
      background:#e2e8f0;color:#0f172a;padding:10px;font-size:.95rem;font-weight:600;}
    .checkrow{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.9rem;}
    .checkrow input{width:20px;height:20px;flex-shrink:0;}

    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;
      overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
    .hidden-media{display:none;}
  </style>
</head>
<body>
<main>

  <header>
    <h1>Polkuopas</h1>
    <p class="tagline">Suuntaa puhelin kulkusuuntaan. Sovellus ohjaa stereoäänimerkillä.</p>
  </header>

  <!-- Käyttötilat -->
  <div class="mode-grid" role="group" aria-label="Reittityyppi">
    <button class="mode-btn" id="modeForest" aria-pressed="true">Metsäpolku</button>
    <button class="mode-btn" id="modeGravel" aria-pressed="false">Hiekkatie</button>
    <button class="mode-btn" id="modeAsphalt" aria-pressed="false">Asfaltti</button>
    <button class="mode-btn" id="modeIndoor" aria-pressed="false">Sisätila</button>
  </div>

  <!-- Aloita / Pysäytä -->
  <div class="ctrl-row">
    <button id="startButton">Aloita</button>
    <button id="stopButton" class="danger">Pysäytä</button>
  </div>

  <!-- Ohjauskenttä -->
  <div id="directionBox" class="direction state-stopped">
    <div class="dlabel">Ohjaus</div>
    <div id="directionValue" class="dvalue">–</div>
    <div id="directionMsg" class="dmsg">Ei käynnissä.</div>
  </div>

  <!-- Asetukset (kokoontaitettava) -->
  <button class="collapsible-btn" id="settingsToggle" aria-expanded="false" aria-controls="settingsPanel">
    Asetukset <span class="arrow" aria-hidden="true">▼</span>
  </button>
  <div class="collapsible-content" id="settingsPanel" role="region" aria-label="Asetukset">
    <label class="setting" for="fpsSelect">Analyysinopeus
      <select id="fpsSelect">
        <option value="5">Virransäästö – 5 FPS</option>
        <option value="10" selected>Normaali – 10 FPS</option>
        <option value="15">Nopea – 15 FPS</option>
        <option value="30">Kehittäjä – 30 FPS</option>
      </select>
    </label>
    <label class="setting" for="cameraQualitySelect">Kameran tarkkuus
      <select id="cameraQualitySelect">
        <option value="low">Matala – 480×270</option>
        <option value="normal" selected>Normaali – 640×360</option>
        <option value="high">Korkea – 1280×720</option>
      </select>
    </label>
    <label class="setting" for="cameraDeviceSelect">Kamera
      <select id="cameraDeviceSelect">
        <option value="">Oletus (taustakamera)</option>
      </select>
    </label>
    <label class="setting" for="threshold">Ohjauskynnys: <span id="thresholdValue">0.20</span>
      <input id="threshold" type="range" min="0.06" max="0.40" step="0.01" value="0.20"/>
    </label>
    <label class="checkrow">
      <input id="beepsEnabled" type="checkbox" checked/>
      Äänimerkit käytössä
    </label>
    <label class="checkrow">
      <input id="voiceOverEnabled" type="checkbox"/>
      VoiceOver-puheohjeet
    </label>
    <label class="checkrow">
      <input id="obstacleEnabled" type="checkbox" checked/>
      Esteentunnistus
    </label>
    <label class="checkrow" id="crosswalkRow">
      <input id="crosswalkEnabled" type="checkbox" checked/>
      Suojatientunnistus (asfaltti)
    </label>
    <button id="audioTestButton" class="secondary full">Äänitesti: vasen – oikea</button>
  </div>

  <!-- Lisätiedot (kokoontaitettava) -->
  <button class="collapsible-btn" id="detailsToggle" aria-expanded="false" aria-controls="detailsPanel">
    Lisätiedot <span class="arrow" aria-hidden="true">▼</span>
  </button>
  <div class="collapsible-content" id="detailsPanel" role="region" aria-label="Lisätiedot">
    <div class="metric"><span>Reittipoikkeama</span><span id="offsetValue">0.00</span></div>
    <div class="bar" aria-hidden="true"><span id="offsetBar"></span></div>
    <div class="metric"><span>Tunnistusvarmuus</span><span id="confidenceValue">0 %</span></div>
    <div class="bar" aria-hidden="true"><span id="confidenceBar"></span></div>
    <div class="metric"><span>Suojatie</span><span id="crosswalkValue">ei havaittu</span></div>
    <div class="bar" aria-hidden="true"><span id="crosswalkBar"></span></div>
    <div class="metric"><span>Este</span><span id="obstacleValue">ei havaittu</span></div>
    <div class="bar" aria-hidden="true"><span id="obstacleBar"></span></div>
  </div>

  <!-- Testisession toiminnot -->
  <div class="bottom-row-3">
    <button id="resetButton" class="secondary">Nollaa mittaushistoria</button>
    <button id="saveTestImageButton" class="secondary">Tallenna testikuva</button>
    <button id="downloadTestZipButton" class="secondary">Lataa ZIP</button>
  </div>

</main>

<div id="voiceOverLiveRegion" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<video id="video" class="hidden-media" playsinline muted aria-hidden="true"></video>
<canvas id="analysisCanvas" class="hidden-media" aria-hidden="true"></canvas>

<script>
'use strict';
const $=id=>document.getElementById(id);
const video=$('video'),analysisCanvas=$('analysisCanvas');
const startButton=$('startButton'),stopButton=$('stopButton'),audioTestButton=$('audioTestButton'),resetButton=$('resetButton'),saveTestImageButton=$('saveTestImageButton'),downloadTestZipButton=$('downloadTestZipButton');
const directionBox=$('directionBox'),directionValue=$('directionValue'),directionMsg=$('directionMsg');
const offsetValue=$('offsetValue'),offsetBar=$('offsetBar');
const confidenceValue=$('confidenceValue'),confidenceBar=$('confidenceBar');
const crosswalkValue=$('crosswalkValue'),crosswalkBar=$('crosswalkBar');
const obstacleValue=$('obstacleValue'),obstacleBar=$('obstacleBar');
const voiceOverLiveRegion=$('voiceOverLiveRegion');
const fpsSelect=$('fpsSelect'),cameraQualitySelect=$('cameraQualitySelect'),cameraDeviceSelect=$('cameraDeviceSelect');
const thresholdInput=$('threshold'),thresholdValue=$('thresholdValue');
const beepsEnabled=$('beepsEnabled'),voiceOverEnabled=$('voiceOverEnabled');
const obstacleEnabled=$('obstacleEnabled'),crosswalkEnabled=$('crosswalkEnabled');
const modeForest=$('modeForest'),modeGravel=$('modeGravel'),modeAsphalt=$('modeAsphalt'),modeIndoor=$('modeIndoor');

let stream=null,animationId=null,audioCtx=null,lastBeepMs=0,lastAnalysisMs=0,running=false;
let selectedMode='forest',history=[],emaOffset=0,emaInitialized=false;let testSamples=[],testSessionId=new Date().toISOString().replace(/[:.]/g,'-'),latestState={};
let currentVisualDirection='',currentVisualMessage='',lastVoiceOverDirection='',lastVoiceOverMs=0;
let crosswalkVisible=false,lastCrosswalkEventMs=0,crosswalkStreak=0,crosswalkMissStreak=0;
let obstacleStreak=0,lastCandidateObstacle='',lastObstacleDirection='',lastObstacleAlertMs=0;

// ── Collapsible panels ────────────────────────────────────────────────────
function setupCollapsible(btnId,panelId){
  const btn=$(btnId),panel=$(panelId);
  btn.addEventListener('click',()=>{
    const open=btn.getAttribute('aria-expanded')==='true';
    btn.setAttribute('aria-expanded',open?'false':'true');
    panel.classList.toggle('open',!open);
  });
}
setupCollapsible('settingsToggle','settingsPanel');
setupCollapsible('detailsToggle','detailsPanel');

// ── Mode config ───────────────────────────────────────────────────────────
const MODE_CONFIG={
  forest:{label:'Metsäpolku',analysisW:320,zones:[
    {top:.80,bottom:.95,weight:1.65,halfWidth:.44},
    {top:.68,bottom:.82,weight:1.42,halfWidth:.39},
    {top:.56,bottom:.70,weight:1.18,halfWidth:.34},
    {top:.46,bottom:.58,weight:.94,halfWidth:.29},
    {top:.38,bottom:.48,weight:.68,halfWidth:.24},
    {top:.31,bottom:.40,weight:.46,halfWidth:.20}]},
  gravel:{label:'Hiekkatie',analysisW:240,zones:[
    {top:.78,bottom:.94,weight:1.55,halfWidth:.46},
    {top:.64,bottom:.80,weight:1.30,halfWidth:.40},
    {top:.52,bottom:.66,weight:1.05,halfWidth:.34},
    {top:.42,bottom:.54,weight:.78,halfWidth:.29},
    {top:.34,bottom:.44,weight:.52,halfWidth:.24}]},
  asphalt:{label:'Asfaltti',analysisW:220,zones:[
    {top:.76,bottom:.94,weight:1.48,halfWidth:.50},
    {top:.60,bottom:.78,weight:1.20,halfWidth:.43},
    {top:.47,bottom:.62,weight:.92,halfWidth:.36},
    {top:.36,bottom:.49,weight:.62,halfWidth:.30}]},
  indoor:{label:'Sisätila',analysisW:240,zones:[
    {top:.78,bottom:.94,weight:1.55,halfWidth:.48},
    {top:.64,bottom:.80,weight:1.28,halfWidth:.42},
    {top:.51,bottom:.66,weight:1.02,halfWidth:.36},
    {top:.40,bottom:.53,weight:.78,halfWidth:.30},
    {top:.31,bottom:.42,weight:.50,halfWidth:.24}]}
};

function setMode(m){
  selectedMode=m;history=[];emaInitialized=false;lastVoiceOverDirection='';
  [modeForest,modeGravel,modeAsphalt,modeIndoor].forEach(b=>b.setAttribute('aria-pressed','false'));
  $('mode'+m.charAt(0).toUpperCase()+m.slice(1)).setAttribute('aria-pressed','true');
  $('crosswalkRow').style.display=m==='asphalt'?'':'none';
  setDirectionUI('-','Moodi: '+MODE_CONFIG[m].label+'.');
}
modeForest.addEventListener('click',()=>setMode('forest'));
modeGravel.addEventListener('click',()=>setMode('gravel'));
modeAsphalt.addEventListener('click',()=>setMode('asphalt'));
modeIndoor.addEventListener('click',()=>setMode('indoor'));

// ── UI ────────────────────────────────────────────────────────────────────
function setDirectionUI(dir,msg){
  if(dir!==currentVisualDirection){
    directionValue.textContent=dir;
    directionBox.className='direction';
    const cls={Vasen:'state-left',Oikea:'state-right',Keskellä:'state-center',
      Este:'state-obstacle',Epävarma:'state-uncertain'}[dir]||'state-stopped';
    directionBox.classList.add(cls);
    currentVisualDirection=dir;
  }
  if(msg!==currentVisualMessage){directionMsg.textContent=msg;currentVisualMessage=msg;}
  announceVoiceOver(dir);
}

function announceVoiceOver(dir){
  if(!voiceOverEnabled.checked||!voiceOverLiveRegion)return;
  const now=performance.now();
  if(dir===lastVoiceOverDirection&&now-lastVoiceOverMs<2500)return;
  const map={Vasen:'vasemmalle',Oikea:'oikealle',Este:'este'};
  if(!map[dir])return;
  lastVoiceOverDirection=dir;lastVoiceOverMs=now;
  voiceOverLiveRegion.textContent='';
  setTimeout(()=>{voiceOverLiveRegion.textContent=map[dir];},20);
}

function speakExact(t){
  if(!voiceOverEnabled.checked||!voiceOverLiveRegion)return;
  voiceOverLiveRegion.textContent='';
  setTimeout(()=>{voiceOverLiveRegion.textContent=t;},20);
}

// ── Audio ─────────────────────────────────────────────────────────────────
function ensureAudio(){
  if(!audioCtx){const C=window.AudioContext||window.webkitAudioContext;if(!C)return null;audioCtx=new C();}
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
function playBeep(pan,severity,kind){
  if(!beepsEnabled.checked)return;
  const ctx=ensureAudio();if(!ctx)return;
  const now=ctx.currentTime,hasPan=typeof ctx.createStereoPanner==='function';
  if(kind==='bling'){
    const p=hasPan?ctx.createStereoPanner():null;
    if(p){p.pan.value=pan||0;p.connect(ctx.destination);}
    for(let r=0;r<2;r++){
      const base=now+r*.22,mg=ctx.createGain();
      mg.gain.setValueAtTime(.0001,base);mg.gain.exponentialRampToValueAtTime(.42,base+.006);
      mg.gain.exponentialRampToValueAtTime(.0001,base+.17);
      if(p)mg.connect(p);else mg.connect(ctx.destination);
      [1568,2349].forEach((fr,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain(),t=base+i*.035;
        o.type='triangle';o.frequency.setValueAtTime(fr,t);
        g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.80,t+.006);g.gain.exponentialRampToValueAtTime(.0001,t+.12);
        o.connect(g);g.connect(mg);o.start(t);o.stop(t+.13);
      });
    }
    return;
  }
  const osc=ctx.createOscillator(),gain=ctx.createGain(),panner=hasPan?ctx.createStereoPanner():null;
  osc.type='square';
  osc.frequency.value=kind==='uncertain'?260:880+Math.min(severity,1)*520;
  gain.gain.setValueAtTime(.0001,now);
  gain.gain.exponentialRampToValueAtTime(kind==='uncertain'?.16:.30,now+.008);
  gain.gain.exponentialRampToValueAtTime(.0001,now+.10);
  if(panner){panner.pan.value=pan;osc.connect(gain);gain.connect(panner);panner.connect(ctx.destination);}
  else{osc.connect(gain);gain.connect(ctx.destination);}
  osc.start(now);osc.stop(now+.12);
}
function playObstacleAlert(pos){
  if(!beepsEnabled.checked)return;
  const ctx=ensureAudio();if(!ctx)return;
  const now=ctx.currentTime,hasPan=typeof ctx.createStereoPanner==='function';
  const pan=pos==='left'?-1:pos==='right'?1:0;
  const osc=ctx.createOscillator(),gain=ctx.createGain(),panner=hasPan?ctx.createStereoPanner():null;
  osc.type='sawtooth';
  osc.frequency.setValueAtTime(180,now);osc.frequency.linearRampToValueAtTime(260,now+.12);
  osc.frequency.linearRampToValueAtTime(180,now+.24);osc.frequency.linearRampToValueAtTime(260,now+.36);
  osc.frequency.linearRampToValueAtTime(180,now+.48);
  gain.gain.setValueAtTime(.0001,now);gain.gain.exponentialRampToValueAtTime(.36,now+.025);
  gain.gain.setValueAtTime(.36,now+.42);gain.gain.exponentialRampToValueAtTime(.0001,now+.56);
  if(panner){panner.pan.value=pan;osc.connect(gain);gain.connect(panner);panner.connect(ctx.destination);}
  else{osc.connect(gain);gain.connect(ctx.destination);}
  osc.start(now);osc.stop(now+.58);
}

// ── Camera ────────────────────────────────────────────────────────────────
function getCameraConstraints(){
  const q=cameraQualitySelect.value;
  if(q==='low')return{width:{ideal:480},height:{ideal:270}};
  if(q==='high')return{width:{ideal:1280},height:{ideal:720}};
  return{width:{ideal:640},height:{ideal:360}};
}
function getTargetFpsMs(){return 1000/Math.max(1,Number(fpsSelect.value||10));}

async function enumerateCameras(){
  try{
    const devs=await navigator.mediaDevices.enumerateDevices();
    const cams=devs.filter(d=>d.kind==='videoinput');
    const cur=cameraDeviceSelect.value;
    cameraDeviceSelect.innerHTML='<option value="">Oletus (taustakamera)</option>';
    cams.forEach((cam,i)=>{
      const o=document.createElement('option');
      o.value=cam.deviceId;
      o.textContent=cam.label||('Kamera '+(i+1));
      if(cam.deviceId===cur)o.selected=true;
      cameraDeviceSelect.appendChild(o);
    });
  }catch(e){console.warn('Kameralistausta ei saatu:',e);}
}

async function startCamera(){
  try{
    ensureAudio();
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      setDirectionUI('-','Tämä selain ei tue kameran käyttöä.');return;
    }
    setDirectionUI('-','Pyydetään kameran käyttöoikeutta...');
    const deviceId=cameraDeviceSelect.value;
    const vidConst=deviceId?{deviceId:{exact:deviceId},...getCameraConstraints()}:{facingMode:{ideal:'environment'},...getCameraConstraints()};
    stream=await navigator.mediaDevices.getUserMedia({video:vidConst,audio:false});
    video.srcObject=stream;
    await video.play();
    await enumerateCameras();
    lastAnalysisMs=0;running=true;history=[];emaInitialized=false;
    setDirectionUI('-','Kamera käynnissä. Moodi: '+MODE_CONFIG[selectedMode].label+'.');
    animationId=requestAnimationFrame(loop);
  }catch(e){
    console.error(e);
    setDirectionUI('-','Kameraa ei voitu käynnistää. Tarkista käyttöoikeus ja HTTPS.');
  }
}

function stopCamera(){
  running=false;
  if(animationId){cancelAnimationFrame(animationId);animationId=null;}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  video.srcObject=null;lastVoiceOverDirection='';
  setDirectionUI('-','Pysäytetty.');
}

function resetHistory(){
  history=[];emaInitialized=false;crosswalkVisible=false;lastVoiceOverDirection='';
  obstacleStreak=0;lastCandidateObstacle='';
  offsetValue.textContent='0.00';offsetBar.style.width='0%';
  confidenceValue.textContent='0 %';confidenceBar.style.width='0%';
  crosswalkValue.textContent='ei havaittu';crosswalkBar.style.width='0%';
  obstacleValue.textContent='ei havaittu';obstacleBar.style.width='0%';
  setDirectionUI('-','Mittaushistoria nollattu.');
}

function loop(ts){
  if(!lastAnalysisMs||ts-lastAnalysisMs>=getTargetFpsMs()){analyzeFrame();lastAnalysisMs=ts;}
  if(running)animationId=requestAnimationFrame(loop);
}

// ── Pixel helpers ─────────────────────────────────────────────────────────
function lumAt(data,w,h,x,y){
  x=Math.max(0,Math.min(w-1,x|0));y=Math.max(0,Math.min(h-1,y|0));
  const i=(y*w+x)*4;return .2126*data[i]+.7152*data[i+1]+.0722*data[i+2];
}
function localVariance(data,w,h,x,y){
  let sum=0,sumSq=0,n=0;
  for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
    const l=lumAt(data,w,h,x+dx,y+dy);sum+=l;sumSq+=l*l;n++;
  }
  const m=sum/n;return Math.max(0,sumSq/n-m*m);
}

// ── Mode pixel scorer ─────────────────────────────────────────────────────
function scorePixel(mode,m,data,w,h,x,y){
  const{r,g,b,lum,saturation,hEdge,vEdge,edge}=m;
  const total=r+g+b+1,rn=r/total,gn=g/total,bn=b/total;
  if(mode==='forest'){
    const variance=localVariance(data,w,h,x,y);
    const texture=Math.max(0,1-variance/900);
    const brown=(rn>.36&&rn>gn&&gn>=bn*.85&&lum<150)?.55:0;
    const dark=(lum>25&&lum<115&&saturation<95)?.28:0;
    const notGreen=(g>r+18&&g>b+18)?-.45:0;
    const smooth=Math.max(0,80-edge)/80;
    const edgeHint=(hEdge>26&&vEdge<24)?.12:0;
    return Math.max(0,texture*.62+brown+dark+smooth*.18+edgeHint+notGreen);
  }
  if(mode==='gravel'){
    const beige=(lum>80&&rn>.31&&gn>.28&&bn<.31)?.55:0;
    const light=Math.max(0,Math.min(1,(lum-55)/125))*.32;
    const lowSat=Math.max(0,115-saturation)/115*.28;
    const smooth=Math.max(0,88-edge)/88*.42;
    const green=(g>r+22&&g>b+22)?-.38:0;
    return Math.max(0,beige+light+lowSat+smooth+green);
  }
  if(mode==='indoor'){
    const variance=localVariance(data,w,h,x,y);
    const texture=Math.max(0,1-variance/700);
    const floorLum=(lum>35&&lum<220)?.24:0;
    const lowSat=Math.max(0,95-saturation)/95*.34;
    const smooth=Math.max(0,72-edge)/72*.50;
    const vPen=(vEdge>38&&hEdge<24)?-.34:0;
    const hPen=(edge>115)?-.22:0;
    const dPen=lum<25?-.30:0;
    return Math.max(0,texture*.44+floorLum+lowSat+smooth+vPen+hPen+dPen);
  }
  // asphalt
  const gray=(saturation<32&&lum>24&&lum<165)?.62:0;
  const darkGray=(saturation<45&&lum>30&&lum<120)?.32:0;
  const smooth=Math.max(0,82-edge)/82*.34;
  const whitePen=(lum>185&&saturation<55)?-.26:0;
  return Math.max(0,gray+darkGray+smooth+whitePen);
}

// ── Corridor detector ─────────────────────────────────────────────────────
function detectCorridor(data,w,h,mode,config,crosswalk){
  const zoneResults=[];
  let predicted=w/2,totalCenter=0,totalWeight=0,totalConf=0,valid=0;
  for(let zi=0;zi<config.zones.length;zi++){
    const z=config.zones[zi];
    const yStart=Math.max(3,Math.floor(h*z.top));
    const yEnd=Math.min(h-4,Math.floor(h*z.bottom));
    const bins=new Array(w).fill(0),counts=new Array(w).fill(0);
    const gateHalf=Math.max(24,w*z.halfWidth/(1+zi*.24));
    for(let y=yStart;y<=yEnd;y+=2){
      const yWeight=.85+.3*((y-yStart)/Math.max(1,yEnd-yStart));
      for(let x=3;x<w-3;x+=2){
        const dx=Math.abs(x-predicted),gate=Math.max(.07,1-Math.pow(dx/gateHalf,2));
        if(gate<=.07&&zi>0)continue;
        const i=(y*w+x)*4,r=data[i],g=data[i+1],b=data[i+2];
        const lum=.2126*r+.7152*g+.0722*b,saturation=Math.max(r,g,b)-Math.min(r,g,b);
        const lL=lumAt(data,w,h,x-1,y),lR=lumAt(data,w,h,x+1,y);
        const lU=lumAt(data,w,h,x,y-1),lD=lumAt(data,w,h,x,y+1);
        const hEdge=Math.abs(lR-lL),vEdge=Math.abs(lD-lU),edge=hEdge+vEdge;
        let score=scorePixel(mode,{r,g,b,lum,saturation,hEdge,vEdge,edge},data,w,h,x,y);
        if(mode==='asphalt'&&crosswalk&&crosswalk.detected&&lum>175&&saturation<60)score*=.45;
        const centerBias=.80+.20*(1-Math.abs(x-w/2)/(w/2));
        const fw=yWeight*gate*centerBias;
        bins[x]+=score*fw;counts[x]+=fw;
      }
    }
    const raw=bins.map((s,i)=>s/Math.max(1e-6,counts[i]));
    const radius=mode==='forest'?11:mode==='asphalt'?9:10;
    const profile=raw.map((_,i)=>{
      let s=0,c=0;
      for(let k=-radius;k<=radius;k++){const j=i+k;if(j>=0&&j<w){s+=raw[j];c++;}}
      return s/Math.max(1,c);
    });
    const max=Math.max(...profile),avg=profile.reduce((a,b)=>a+b,0)/profile.length;
    const min=Math.min(...profile),spread=max-avg,cutoff=avg+spread*(mode==='forest'?.26:.30);
    let wx=0,tw=0,bestX=w/2,best=-Infinity;
    for(let x=0;x<w;x++){
      if(profile[x]>best){best=profile[x];bestX=x;}
      const mass=Math.max(0,profile[x]-cutoff);wx+=x*mass;tw+=mass;
    }
    const center=tw>.001?wx/tw:bestX;
    const contrast=Math.min(1,spread/Math.max(.001,avg-min+.10));
    const dist=Math.abs(center-predicted)/Math.max(1,gateHalf);
    const cont=zi===0?1:Math.max(0,1-dist);
    const zoneConf=Math.max(0,Math.min(1,contrast*(.42+.58*cont)));
    zoneResults.push({y:(yStart+yEnd)/2,center,confidence:zoneConf,weight:z.weight});
    if(zoneConf>.13){valid++;totalConf+=zoneConf;const cw=z.weight*(.25+zoneConf);totalCenter+=center*cw;totalWeight+=cw;}
    const trust=Math.min(.78,.28+zoneConf*.50);
    predicted=predicted*(1-trust)+center*trust;
  }
  let centerX=totalWeight>0?totalCenter/totalWeight:w/2;
  let fitW=0,sumY=0,sumX2=0;
  for(const zr of zoneResults){const ww=zr.weight*Math.max(0,zr.confidence-.08);fitW+=ww;sumY+=zr.y*ww;sumX2+=zr.center*ww;}
  if(fitW>.001){
    const my=sumY/fitW,mx=sumX2/fitW;let num=0,den=0;
    for(const zr of zoneResults){const ww=zr.weight*Math.max(0,zr.confidence-.08);num+=ww*(zr.y-my)*(zr.center-mx);den+=ww*Math.pow(zr.y-my,2);}
    const slope=den>.001?num/den:0,aim=mx+slope*(h*.58-my);
    centerX=centerX*.68+aim*.32;
  }
  const rawOffset=(centerX-w/2)/(w/2);
  const avgConf=valid>0?totalConf/valid:0;
  const conf=Math.max(0,Math.min(1,avgConf*(.65+.35*Math.min(1,valid/Math.min(3,config.zones.length)))));
  const alpha=.20+conf*.42;
  if(!emaInitialized){emaOffset=rawOffset;emaInitialized=true;}
  else emaOffset=alpha*rawOffset+(1-alpha)*emaOffset;
  history.push({rawOffset:emaOffset,conf});
  if(history.length>12)history.shift();
  const usable=history.filter(v=>v.conf>.16);
  const smoothOffset=usable.length?usable.reduce((a,b)=>a+b.rawOffset,0)/usable.length:emaOffset;
  const smoothConf=history.reduce((a,b)=>a+b.conf,0)/Math.max(1,history.length);
  return{offset:smoothOffset,confidence:smoothConf,zoneResults,centerX};
}

// ── Suojatientunnistus (tiukennettu) ─────────────────────────────────────
/*
  Tiukennetut kriteerit häiriöitä vastaan:
  1. Vaaditaan vähintään 4 linjaa (aiemmin 3)
  2. Linjan minimileveys: 55 % kuvan leveydestä (aiemmin 28 %)
  3. Tasavälisyysvaatimus tiukennettu: hajonta < 40 % (aiemmin 75 %)
  4. Yksittäinen keppi/viiva ei läpäise leveyssuodatinta
  5. Parkkiruudut: pystysuorat reunat eivät läpäise; vaakasuuntaiset voivat,
     mutta tasavälisyysvaatimus karsii epäsäännölliset sarjat
  6. Minimivarmuus nostettu 0.56 → 0.65
*/
function detectCrosswalk(data,w,h){
  /*
    v14:
    - vaaditaan vähintään 3 suojatieviivaa
    - jokaisen viivan kulman pitää olla enintään noin 30 astetta vaakatasosta
    - kuvan alin osa jätetään pois, jotta valkoinen keppi ei aiheuttaisi hälyjä
  */
  const xMin=Math.floor(w*.06),xMax=Math.floor(w*.94);
  const yMin=Math.floor(h*.28),yMax=Math.floor(h*.84); // v14: ei alinta 16 %
  const minLineWidth=w*.44; // hieman kevyempi, koska mukana kulmakriteeri
  const rows=[];

  for(let y=yMin;y<=yMax;y+=2){
    let count=0,sumX=0,minX=w,maxX=0;
    for(let x=xMin;x<=xMax;x+=2){
      const i=(y*w+x)*4,r=data[i],g=data[i+1],b=data[i+2];
      const lum=.2126*r+.7152*g+.0722*b,sat=Math.max(r,g,b)-Math.min(r,g,b);
      const lU=lumAt(data,w,h,x,y-2),lD=lumAt(data,w,h,x,y+2);
      const contrast=lum-(lU+lD)/2;
      if(lum>180&&sat<48&&contrast>-10){
        count++;sumX+=x;minX=Math.min(minX,x);maxX=Math.max(maxX,x);
      }
    }
    const ratio=count/Math.max(1,(xMax-xMin)/2),width=maxX-minX;
    if(ratio>.24&&width>minLineWidth)rows.push({y,ratio,x:sumX/Math.max(1,count),width,minX,maxX});
  }

  if(rows.length<5)return{detected:false,confidence:0,direction:null,lineCount:0};

  const clusters=[];let cur=[rows[0]];
  for(let i=1;i<rows.length;i++){
    if(rows[i].y-rows[i-1].y<=5)cur.push(rows[i]);
    else{clusters.push(cur);cur=[rows[i]];}
  }
  clusters.push(cur);

  let lines=clusters.map(c=>{
    const wt=c.reduce((a,b)=>a+b.ratio,0);
    return{
      y:c.reduce((a,b)=>a+b.y*b.ratio,0)/wt,
      x:c.reduce((a,b)=>a+b.x*b.ratio,0)/wt,
      ratio:wt/c.length,
      width:c.reduce((a,b)=>a+b.width,0)/c.length,
      minX:Math.min(...c.map(r=>r.minX)),
      maxX:Math.max(...c.map(r=>r.maxX)),
      thickness:c.length
    };
  }).filter(l=>l.thickness>=2&&l.width>minLineWidth&&l.ratio>.22);

  const merged=[];
  for(const line of lines){
    const prev=merged[merged.length-1];
    if(prev&&Math.abs(line.y-prev.y)<h*.04){
      const w1=prev.ratio*prev.thickness,w2=line.ratio*line.thickness,wt=w1+w2;
      prev.y=(prev.y*w1+line.y*w2)/wt;
      prev.x=(prev.x*w1+line.x*w2)/wt;
      prev.ratio=(prev.ratio+line.ratio)/2;
      prev.width=Math.max(prev.width,line.width);
      prev.minX=Math.min(prev.minX,line.minX);
      prev.maxX=Math.max(prev.maxX,line.maxX);
      prev.thickness+=line.thickness;
    }else merged.push({...line});
  }
  lines=merged;

  // v14: vähintään 3 viivaa.
  if(lines.length<3)return{detected:false,confidence:0,direction:null,lineCount:lines.length};

  /*
    Kulmakriteeri.
    Tässä arvioidaan yksittäisen viivan kallistusta sen vaaleiden rivien
    x-keskipisteiden muutoksesta. Suojatieviiva saa olla vaakasuora tai
    enintään noin 30 astetta vaakatasosta.
  */
  const maxAngleRad=Math.PI/6; // 30 astetta
  const angleOkLines=[];
  for(const line of lines){
    // Arvioidaan paikallinen kallistus alkuperäisistä riveistä lähellä line.y.
    const related=rows.filter(r=>Math.abs(r.y-line.y)<Math.max(6,h*.035));
    if(related.length<2){
      angleOkLines.push(line);
      continue;
    }

    let n=0,sumY=0,sumX=0,sumYY=0,sumYX=0;
    for(const r of related){
      n++;sumY+=r.y;sumX+=r.x;sumYY+=r.y*r.y;sumYX+=r.y*r.x;
    }
    const denom=n*sumYY-sumY*sumY;
    let angle=0;
    if(Math.abs(denom)>0.001){
      const dxdy=(n*sumYX-sumY*sumX)/denom;
      // dx/dy -> viivan suunta suhteessa vaakaan:
      // dy/dx = 1/(dx/dy), mutta jos dxdy on suuri, viiva on vaakamaisempi.
      const dydx=Math.abs(dxdy)>0.001?1/dxdy:999;
      angle=Math.abs(Math.atan(dydx));
    }

    if(angle<=maxAngleRad)angleOkLines.push(line);
  }
  lines=angleOkLines;

  if(lines.length<3)return{detected:false,confidence:0,direction:null,lineCount:lines.length};

  let sw=0,sx=0,sy=0;
  for(const l of lines){const wt=l.ratio*l.width;sw+=wt;sx+=l.x*wt;sy+=l.y*wt;}
  const mx=sx/sw,my=sy/sw;

  let num=0,den=0;
  for(const l of lines){const wt=l.ratio*l.width;num+=wt*(l.y-my)*(l.x-mx);den+=wt*Math.pow(l.y-my,2);}
  const slope=den>.001?num/den:0;

  const gaps=[];
  for(let i=1;i<lines.length;i++)gaps.push(lines[i].y-lines[i-1].y);
  const avgGap=gaps.reduce((a,b)=>a+b,0)/gaps.length;
  const gapVar=gaps.reduce((a,b)=>a+Math.pow(b-avgGap,2),0)/gaps.length;
  const spacingOk=avgGap>h*.035&&avgGap<h*.25&&Math.sqrt(gapVar)<avgGap*.55;

  const residual=lines.reduce((a,l)=>a+Math.abs(l.x-(mx+slope*(l.y-my))),0)/lines.length;
  const parallelOk=residual<w*.12;

  if(!spacingOk||!parallelOk)return{detected:false,confidence:0,direction:null,lineCount:lines.length};

  const countS=Math.min(1,lines.length/4);
  const widthS=Math.min(1,lines.reduce((a,b)=>a+b.width,0)/lines.length/(w*.55));
  const brightS=Math.min(1,lines.reduce((a,b)=>a+b.ratio,0)/lines.length/.35);
  const confidence=Math.max(0,Math.min(1,countS*.36+widthS*.34+brightS*.30));

  let direction=null;
  if(confidence>.62){
    if(slope<-.22)direction='left';
    else if(slope>.22)direction='right';
  }

  return{detected:confidence>.62,confidence,direction,slope,lineCount:lines.length};
}

// ── Esteentunnistus// ── Esteentunnistus ───────────────────────────────────────────────────────
function detectObstacle(data,w,h,mode,routeResult){
  if(!routeResult||routeResult.confidence<.24)return{detected:false,confidence:0,position:null,freeColumn:null};
  const routeCenter=w/2+(isFinite(routeResult.offset)?routeResult.offset*(w/2):0);
  const laneHalf=Math.max(32,Math.floor(w*.28));

  /* METSÄPOLKU: säilytetään eri logiikka, joka etsii polun poikki kulkevaa kappaletta. */
  if(mode==='forest'){
    const yStart=Math.floor(h*.52),yEnd=Math.floor(h*.90);
    const leftEdge=Math.max(4,Math.floor(routeCenter-laneHalf));
    const rightEdge=Math.min(w-5,Math.floor(routeCenter+laneHalf));
    const rowHits=[];
    for(let y=yStart;y<=yEnd;y+=3){
      let hitCount=0,sumX=0,minX=w,maxX=0,edgeSum=0,stoneWood=0;
      for(let x=leftEdge;x<=rightEdge;x+=3){
        const idx=(y*w+x)*4,r=data[idx],g=data[idx+1],b=data[idx+2];
        const lum=.2126*r+.7152*g+.0722*b,sat=Math.max(r,g,b)-Math.min(r,g,b);
        const lL=lumAt(data,w,h,x-2,y),lR=lumAt(data,w,h,x+2,y);
        const lU=lumAt(data,w,h,x,y-2),lD=lumAt(data,w,h,x,y+2);
        const hEdge=Math.abs(lR-lL),vEdge=Math.abs(lD-lU),edge=hEdge+vEdge;
        const total2=r+g+b+1,rn=r/total2,gn=g/total2,bn=b/total2;
        const woodLike=(rn>.35&&rn>gn*.95&&gn>bn*.75&&sat>18&&lum>28&&lum<165);
        const stoneLike=(sat<48&&lum>45&&lum<180&&edge>38);
        const crossEdge=hEdge>28||edge>70;
        const greenVeg=(g>r+25&&g>b+25);
        if((woodLike||stoneLike||crossEdge)&&!greenVeg){
          hitCount++;sumX+=x;minX=Math.min(minX,x);maxX=Math.max(maxX,x);
          edgeSum+=edge;if(woodLike||stoneLike)stoneWood++;
        }
      }
      const width=maxX-minX,ratio=hitCount/Math.max(1,(rightEdge-leftEdge)/3);
      if(ratio>.32&&width>laneHalf*1.75&&(edgeSum/Math.max(1,hitCount)>42||stoneWood>hitCount*.22))
        rowHits.push({y,x:sumX/Math.max(1,hitCount),minX,maxX,width,ratio});
    }
    if(rowHits.length<3)return{detected:false,confidence:0,position:null,freeColumn:null};
    const clusters=[];let cur2=[rowHits[0]];
    for(let i=1;i<rowHits.length;i++){
      if(rowHits[i].y-rowHits[i-1].y<=9)cur2.push(rowHits[i]);
      else{clusters.push(cur2);cur2=[rowHits[i]];}
    }
    clusters.push(cur2);
    const best=clusters.map(c=>({
      y:c.reduce((a,b)=>a+b.y,0)/c.length,x:c.reduce((a,b)=>a+b.x,0)/c.length,
      minX:Math.min(...c.map(r=>r.minX)),maxX:Math.max(...c.map(r=>r.maxX)),
      width:c.reduce((a,b)=>a+b.width,0)/c.length,ratio:c.reduce((a,b)=>a+b.ratio,0)/c.length,
      rows:c.length
    })).sort((a,b)=>b.width*b.rows-a.width*a.rows)[0];
    if(!best||best.rows<3)return{detected:false,confidence:0,position:null,freeColumn:null};
    const spanFraction=(best.maxX-best.minX)/Math.max(1,rightEdge-leftEdge);
    if(spanFraction<.80){
      let sy2=0,sx2=0,sxy=0,syy=0,n=rowHits.length;
      for(const rh of rowHits){sy2+=rh.y;sx2+=rh.x;sxy+=rh.y*rh.x;syy+=rh.y*rh.y;}
      const denom=n*syy-sy2*sy2;
      if(Math.abs(denom)<1)return{detected:false,confidence:0,position:null,freeColumn:null};
      const slope2=(n*sxy-sy2*sx2)/denom,intercept2=(sx2-slope2*sy2)/n;
      const inliers=rowHits.filter(rh=>Math.abs(rh.x-(slope2*rh.y+intercept2))<laneHalf*.45);
      const ySpan=Math.max(...rowHits.map(r=>r.y))-Math.min(...rowHits.map(r=>r.y));
      if(inliers.length<Math.max(3,rowHits.length*.55)||ySpan<h*.18)
        return{detected:false,confidence:0,position:null,freeColumn:null};
    }
    const confidence=Math.min(1,(best.width/(laneHalf*1.8))*.50+(best.rows/6)*.28+best.ratio*.30);
    return{detected:confidence>.52,confidence,position:'center',freeColumn:null};
  }

  /*
    v13: HIEKKATIE / ASFALTTI / SISÄTILA
    Kaukoalue vaikuttaa vain reitinohjaukseen.
    Varsinainen estehälytys annetaan vain kuvan alaosan lähialueelta.
  */
  const cols={
    left:{xMin:Math.max(4,Math.floor(routeCenter-laneHalf)),xMax:Math.floor(routeCenter-laneHalf*.3),freeDepth:0,nearBlocked:false},
    center:{xMin:Math.floor(routeCenter-laneHalf*.32),xMax:Math.floor(routeCenter+laneHalf*.32),freeDepth:0,nearBlocked:false},
    right:{xMin:Math.floor(routeCenter+laneHalf*.3),xMax:Math.min(w-5,Math.floor(routeCenter+laneHalf)),freeDepth:0,nearBlocked:false}
  };

  function rowAnomaly(y,col){
    let rowScore=0,rowCount=0;
    for(let x=col.xMin;x<=col.xMax;x+=3){
      const idx=(y*w+x)*4,r=data[idx],g=data[idx+1],b=data[idx+2];
      const lum=.2126*r+.7152*g+.0722*b,saturation=Math.max(r,g,b)-Math.min(r,g,b);
      const lL=lumAt(data,w,h,x-2,y),lR=lumAt(data,w,h,x+2,y);
      const lU=lumAt(data,w,h,x,y-2),lD=lumAt(data,w,h,x,y+2);
      const hEdge=Math.abs(lR-lL),vEdge=Math.abs(lD-lU),edge=hEdge+vEdge;
      const surface=scorePixel(mode,{r,g,b,lum,saturation,hEdge,vEdge,edge},data,w,h,x,y);
      const variance=localVariance(data,w,h,x,y);
      const notSurface=Math.max(0,.94-surface);
      const shape=Math.min(1,edge/145)*.38+Math.min(1,variance/1900)*.28;
      const veryBrightObject=(lum>218&&saturation<62)?.10:0;
      let anomaly=notSurface*.46+shape+veryBrightObject;

      if(mode==='indoor'&&edge<55&&variance<1100)anomaly*=.45;
      if(mode==='gravel'&&edge<48&&variance<1200)anomaly*=.55;
      if(mode==='asphalt'&&edge<45&&variance<1050)anomaly*=.55;

      rowScore+=anomaly;rowCount++;
    }
    return rowCount?rowScore/rowCount:0;
  }

  // Kaukoalue: vain vapaamman suunnan valintaan.
  const farStart=Math.floor(h*.42),farEnd=Math.floor(h*.90);
  for(const col of Object.values(cols)){
    let firstBlockY=farStart;
    for(let y=farEnd;y>=farStart;y-=3){
      if(rowAnomaly(y,col)>.66){firstBlockY=y;break;}
    }
    col.freeDepth=(firstBlockY-farStart)/Math.max(1,farEnd-farStart);
  }

  let freeColumn=null;
  if(cols.center.freeDepth<.46){
    if(cols.left.freeDepth>cols.center.freeDepth+.12&&cols.left.freeDepth>=cols.right.freeDepth)freeColumn='left';
    else if(cols.right.freeDepth>cols.center.freeDepth+.12&&cols.right.freeDepth>cols.left.freeDepth)freeColumn='right';
  }

  // Lähialue: vain tämä saa aiheuttaa estehälytyksen.
  const nearStart=Math.floor(h*.74),nearEnd=Math.floor(h*.97);
  const nearThreshold=mode==='indoor'?.72:.76;
  for(const col of Object.values(cols)){
    let blockedRows=0,totalRows=0,consecutive=0,maxConsecutive=0;
    for(let y=nearEnd;y>=nearStart;y-=3){
      const a=rowAnomaly(y,col);
      totalRows++;
      if(a>nearThreshold){blockedRows++;consecutive++;maxConsecutive=Math.max(maxConsecutive,consecutive);}
      else consecutive=0;
    }
    const ratio=blockedRows/Math.max(1,totalRows);
    col.nearBlocked=ratio>.55&&maxConsecutive>=3;
  }

  const allNearBlocked=cols.left.nearBlocked&&cols.center.nearBlocked&&cols.right.nearBlocked;
  if(!allNearBlocked)return{detected:false,confidence:0,position:null,freeColumn};

  return{detected:true,confidence:.72,position:'center',freeColumn:null};
}

// ── State updaters// ── State updaters ────────────────────────────────────────────────────────
function updateObstacleState(obstacle){
  if(!obstacle||!obstacle.detected){
    obstacleStreak=Math.max(0,obstacleStreak-1);
    if(obstacleStreak===0){lastCandidateObstacle='';obstacleValue.textContent='ei havaittu';obstacleBar.style.width='0%';}
    return;
  }
  const pos=obstacle.position||'center';
  if(pos===lastCandidateObstacle)obstacleStreak++;
  else{lastCandidateObstacle=pos;obstacleStreak=1;}
  const confirmed=obstacleStreak>=3;
  obstacleValue.textContent=confirmed?'ESTE – tie poikki '+Math.round(obstacle.confidence*100)+' %':'varmistetaan…';
  obstacleBar.style.width=confirmed?Math.min(100,obstacle.confidence*100)+'%':Math.min(100,obstacleStreak*33)+'%';
}

function updateCrosswalkState(cw){
  const candidate=!!(cw&&cw.detected);
  if(candidate){crosswalkStreak++;crosswalkMissStreak=0;}
  else{crosswalkMissStreak++;crosswalkStreak=0;}
  const confirmed=crosswalkStreak>=4; // tiukennettu: 3 → 4 peräkkäistä
  const ended=crosswalkVisible&&crosswalkMissStreak>=5;
  crosswalkValue.textContent=confirmed?'havaittu '+Math.round(cw.confidence*100)+' %':'ei havaittu';
  crosswalkBar.style.width=confirmed?Math.min(100,cw.confidence*100)+'%':'0%';
  const now=performance.now();
  if(confirmed&&!crosswalkVisible&&now-lastCrosswalkEventMs>1400){
    crosswalkVisible=true;lastCrosswalkEventMs=now;
    playBeep(0,1,'bling');speakExact('suojatie');
  }else if(ended&&now-lastCrosswalkEventMs>1400){
    crosswalkVisible=false;lastCrosswalkEventMs=now;
    playBeep(0,1,'bling');speakExact('suojatie päättyy');
  }
}

function triggerObstacleAlert(obstacle){
  const now=performance.now(),pos=obstacle.position||'center';
  if(pos===lastObstacleDirection&&now-lastObstacleAlertMs<1800)return;
  lastObstacleDirection=pos;lastObstacleAlertMs=now;
  playObstacleAlert(pos);speakExact('este');
}

// ── Main guidance update ──────────────────────────────────────────────────
function updateGuidance(result,cw,obstacle){
  offsetValue.textContent=result.offset.toFixed(2);
  offsetBar.style.width=Math.min(100,Math.abs(result.offset)*100)+'%';
  confidenceValue.textContent=Math.round(result.confidence*100)+' %';
  confidenceBar.style.width=Math.min(100,result.confidence*100)+'%';

  const threshold=Number(thresholdInput.value);
  const pathGate=selectedMode==='forest'?.34:.22;
  let dir='Keskellä',msg='Reitti vaikuttaa olevan keskellä.';

  if(result.confidence<pathGate){
    dir='Epävarma';msg=selectedMode==='forest'?'Polkua ei tunnisteta riittävän varmasti.':'Reittiä ei tunnisteta luotettavasti.';
  }else if(obstacle&&obstacle.detected&&obstacleStreak>=3){
    dir='Este';msg='Tie on poikki. Ole varovainen.';
    triggerObstacleAlert(obstacle);
  }else if(obstacle&&obstacle.freeColumn&&obstacle.freeColumn!=='center'&&result.confidence>=pathGate){
    if(obstacle.freeColumn==='left'){dir='Vasen';msg='Reitti vapaampi vasemmalla. Käänny vasemmalle.';}
    else{dir='Oikea';msg='Reitti vapaampi oikealla. Käänny oikealle.';}
  }else if(selectedMode==='asphalt'&&crosswalkVisible&&cw&&cw.detected&&cw.direction){
    if(cw.direction==='left'){dir='Vasen';msg='Suojatien kulkusuunta vaatii vasemmalle kääntymistä.';}
    else{dir='Oikea';msg='Suojatien kulkusuunta vaatii oikealle kääntymistä.';}
  }else if(result.offset<-threshold){
    dir='Vasen';msg='Reitin keskilinja on vasemmalla.';
  }else if(result.offset>threshold){
    dir='Oikea';msg='Reitin keskilinja on oikealla.';
  }

  latestState={
    timestamp:new Date().toISOString(),
    mode:selectedMode,
    modeLabel:MODE_CONFIG[selectedMode]?.label||selectedMode,
    direction:dir,
    message:msg,
    offset:result.offset,
    confidence:result.confidence,
    crosswalkVisible,
    crosswalkText:crosswalkValue.textContent,
    obstacleText:obstacleValue.textContent,
    threshold:Number(thresholdInput.value),
    fps:Number(fpsSelect.value||10),
    cameraQuality:cameraQualitySelect.value,
    obstacleEnabled:obstacleEnabled.checked,
    crosswalkEnabled:crosswalkEnabled.checked
  };
  setDirectionUI(dir,msg);
  const now=performance.now(),abs=Math.abs(result.offset);
  const interval=Math.max(180,720-abs*820);
  if(now-lastBeepMs>interval){
    if(dir==='Vasen'){playBeep(-1,abs,'guide');lastBeepMs=now;}
    else if(dir==='Oikea'){playBeep(1,abs,'guide');lastBeepMs=now;}
    else if(dir==='Epävarma'){lastBeepMs=now;}
  }
}

// ── analyzeFrame ──────────────────────────────────────────────────────────
function analyzeFrame(){
  if(!video||video.readyState<2)return;
  const vw=video.videoWidth||640,vh=video.videoHeight||480;
  if(!vw||!vh)return;
  const config=MODE_CONFIG[selectedMode]||MODE_CONFIG.forest;
  const analysisW=config.analysisW,analysisH=Math.round((vh/vw)*analysisW);
  analysisCanvas.width=analysisW;analysisCanvas.height=analysisH;
  const ctx=analysisCanvas.getContext('2d',{willReadFrequently:true});
  ctx.drawImage(video,0,0,analysisW,analysisH);
  const data=ctx.getImageData(0,0,analysisW,analysisH).data;

  const cw=selectedMode==='asphalt'&&crosswalkEnabled.checked
    ?detectCrosswalk(data,analysisW,analysisH)
    :{detected:false,confidence:0,direction:null};
  updateCrosswalkState(cw);

  const result=detectCorridor(data,analysisW,analysisH,selectedMode,config,cw);
  const obstacle=obstacleEnabled.checked
    ?detectObstacle(data,analysisW,analysisH,selectedMode,result)
    :{detected:false,confidence:0,position:null,freeColumn:null};
  updateObstacleState(obstacle);
  updateGuidance(result,cw,obstacle);
}


// ── Testikuvat ja ZIP-paketti ─────────────────────────────────────────────
const TEST_LABELS=[
  ['turha_suojatiehavainto','Turha suojatiehavainto'],
  ['suojatie_puuttui','Ei suojatieilmoitusta vaikka olisi pitänyt'],
  ['oikea_suojatiehavainto','Oikea suojatiehavainto'],
  ['turha_estehavainto','Turha estehavainto'],
  ['este_puuttui','Ei esteilmoitusta vaikka olisi pitänyt'],
  ['oikea_estehavainto','Oikea estehavainto'],
  ['muu','Muu havainto']
];

function chooseTestLabel(){
  const msg='Valitse testikuvan luokka:\n\n'+TEST_LABELS.map((x,i)=>(i+1)+'. '+x[1]).join('\n');
  const ans=window.prompt(msg,'1');
  if(ans===null)return null;
  const idx=Math.max(1,Math.min(TEST_LABELS.length,parseInt(ans,10)||1))-1;
  const note=window.prompt('Vapaa muistiinpano, voi jättää tyhjäksi:','')||'';
  return{code:TEST_LABELS[idx][0],label:TEST_LABELS[idx][1],note};
}

function canvasToBlob(canvas,type='image/jpeg',quality=.88){
  return new Promise(resolve=>canvas.toBlob(resolve,type,quality));
}

async function saveTestImage(){
  if(!video||video.readyState<2){
    setDirectionUI(currentVisualDirection||'-','Kamera ei ole valmis testikuvan tallennukseen.');
    return;
  }
  const label=chooseTestLabel();
  if(!label)return;

  const vw=video.videoWidth||640,vh=video.videoHeight||480;
  const maxW=1280;
  const outW=Math.min(maxW,vw);
  const outH=Math.round(vh*(outW/vw));
  const c=document.createElement('canvas');
  c.width=outW;c.height=outH;
  c.getContext('2d').drawImage(video,0,0,outW,outH);
  const blob=await canvasToBlob(c,'image/jpeg',.88);
  if(!blob){
    setDirectionUI(currentVisualDirection||'-','Testikuvaa ei voitu tallentaa.');
    return;
  }

  const num=String(testSamples.length+1).padStart(3,'0');
  const safeLabel=label.code.replace(/[^a-z0-9_äöå-]/gi,'_');
  const fileName=`images/${num}_${safeLabel}.jpg`;
  const meta={
    sampleNumber:testSamples.length+1,
    fileName,
    labelCode:label.code,
    label:label.label,
    note:label.note,
    capturedAt:new Date().toISOString(),
    sessionId:testSessionId,
    appVersion:'v15',
    videoWidth:vw,
    videoHeight:vh,
    savedWidth:outW,
    savedHeight:outH,
    latestState:{...latestState}
  };
  testSamples.push({fileName,blob,meta});
  setDirectionUI(currentVisualDirection||'-',`Testikuva tallennettu (${testSamples.length}).`);
}

function crc32Table(){
  const table=[];
  for(let n=0;n<256;n++){
    let c=n;
    for(let k=0;k<8;k++)c=((c&1)?(0xedb88320^(c>>>1)):(c>>>1));
    table[n]=c>>>0;
  }
  return table;
}
const CRC_TABLE=crc32Table();
function crc32(bytes){
  let c=0xffffffff;
  for(let i=0;i<bytes.length;i++)c=CRC_TABLE[(c^bytes[i])&0xff]^(c>>>8);
  return (c^0xffffffff)>>>0;
}
function u16(n){return [n&255,(n>>>8)&255];}
function u32(n){return [n&255,(n>>>8)&255,(n>>>16)&255,(n>>>24)&255];}
function dateToDos(d){
  return{time:(d.getHours()<<11)|(d.getMinutes()<<5)|(Math.floor(d.getSeconds()/2)),date:((d.getFullYear()-1980)<<9)|((d.getMonth()+1)<<5)|d.getDate()};
}
async function makeZip(files){
  const enc=new TextEncoder(),parts=[],central=[];
  let offset=0;
  const now=dateToDos(new Date());
  for(const f of files){
    const nameBytes=enc.encode(f.name);
    const data=f.data instanceof Uint8Array?f.data:new Uint8Array(await f.data.arrayBuffer());
    const crc=crc32(data);
    const local=new Uint8Array([...u32(0x04034b50),...u16(20),...u16(0x0800),...u16(0),...u16(now.time),...u16(now.date),...u32(crc),...u32(data.length),...u32(data.length),...u16(nameBytes.length),...u16(0)]);
    parts.push(local,nameBytes,data);
    const ch=new Uint8Array([...u32(0x02014b50),...u16(20),...u16(20),...u16(0x0800),...u16(0),...u16(now.time),...u16(now.date),...u32(crc),...u32(data.length),...u32(data.length),...u16(nameBytes.length),...u16(0),...u16(0),...u16(0),...u16(0),...u32(0),...u32(offset)]);
    central.push(ch,nameBytes);
    offset+=local.length+nameBytes.length+data.length;
  }
  const centralSize=central.reduce((s,p)=>s+p.length,0);
  const end=new Uint8Array([...u32(0x06054b50),...u16(0),...u16(0),...u16(files.length),...u16(files.length),...u32(centralSize),...u32(offset),...u16(0)]);
  return new Blob([...parts,...central,end],{type:'application/zip'});
}

async function downloadTestZip(){
  if(testSamples.length===0){
    setDirectionUI(currentVisualDirection||'-','Ei tallennettuja testikuvia.');
    return;
  }
  const metadata={
    sessionId:testSessionId,
    createdAt:new Date().toISOString(),
    appVersion:'v15',
    sampleCount:testSamples.length,
    samples:testSamples.map(s=>s.meta)
  };
  const files=[
    {name:'metadata.json',data:new TextEncoder().encode(JSON.stringify(metadata,null,2))},
    ...testSamples.map(s=>({name:s.fileName,data:s.blob}))
  ];
  const zip=await makeZip(files);
  const url=URL.createObjectURL(zip);
  const a=document.createElement('a');
  a.href=url;
  a.download=`polkuopas_testikuvat_${testSessionId}.zip`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  setDirectionUI(currentVisualDirection||'-',`ZIP ladattu (${testSamples.length} kuvaa).`);
}
